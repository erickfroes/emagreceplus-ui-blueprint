name: UI CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint (if script exists)
        run: |
          if npm run | grep -q "^[[:space:]]*lint$"; then
            npm run lint
          else
            echo "lint script not found; skipping."
          fi
